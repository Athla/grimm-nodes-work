name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: binary/go.sum

      - name: Download dependencies
        working-directory: binary
        run: go mod download

      - name: Run tests
        working-directory: binary
        run: go test ./...

      - name: Vet
        working-directory: binary
        run: go vet ./...

      - name: Check formatting
        working-directory: binary
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        working-directory: webui
        run: npm ci

      - name: Build
        working-directory: webui
        run: npm run build
